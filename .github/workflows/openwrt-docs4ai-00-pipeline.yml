name: openwrt-docs4ai pipeline (v12)

on:
  schedule:
    - cron: "0 4 1 * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_wiki:
        description: 'Skip wiki scraping'
        type: boolean
        default: false
      skip_buildroot:
        description: 'Skip buildroot/examples extraction'
        type: boolean
        default: false
      skip_ai:
        description: 'Skip AI summarization'
        type: boolean
        default: false
      max_ai_files:
        description: 'Max files for AI summarization'
        type: number
        default: 40

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PUBLISH_DIR: openwrt-condensed-docs
  WORKDIR: ${{ github.workspace }}/tmp
  OUTDIR: ${{ github.workspace }}/staging

jobs:
  # ── Phase 1: Setup & Clone ───────────────────────────
  initialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt
      - name: Create directories
        run: mkdir -p "$WORKDIR"
      - name: Clone repositories
        env:
          SKIP_BUILDROOT: ${{ inputs.skip_buildroot || 'false' }}
          GITHUB_ENV: ${{ github.env }}
        run: python .github/scripts/openwrt-docs4ai-01-clone-repos.py
      - name: Upload L0 Repos & Manifest
        uses: actions/upload-artifact@v4
        with:
          name: L0-repos
          path: |
            ${{ env.WORKDIR }}/repo-*
            ${{ env.WORKDIR }}/repo-manifest.json
          retention-days: 1

  # ── Phase 2: Extraction (Matrix) ─────────────────────
  extract:
    needs: initialize
    runs-on: ubuntu-latest
    strategy:
      matrix:
        script: [
          "02a-scrape-wiki.py",
          "02b-scrape-ucode.py",
          "02c-scrape-jsdoc.py",
          "02d-scrape-core-packages.py",
          "02e-scrape-example-packages.py",
          "02f-scrape-procd-api.py",
          "02g-scrape-uci-schemas.py",
          "02h-scrape-hotplug-events.py"
        ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r .github/scripts/requirements.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          npm install -g jsdoc-to-markdown
      - name: Cache Wiki Metadata
        if: matrix.script == '02a-scrape-wiki.py'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WORKDIR }}/.cache
            ${{ env.WORKDIR }}/L1-raw/wiki
          key: wiki-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            wiki-cache-${{ runner.os }}-
      - name: Download L0
        uses: actions/download-artifact@v4
        with:
          name: L0-repos
          path: ${{ env.WORKDIR }}
      - name: Extract ${{ matrix.script }}
        env:
          SKIP_WIKI: ${{ inputs.skip_wiki || 'false' }}
          SKIP_BUILDROOT: ${{ inputs.skip_buildroot || 'false' }}
        run: python .github/scripts/openwrt-docs4ai-${{ matrix.script }}
      - name: Upload L1 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: L1-${{ matrix.script }}
          path: ${{ env.WORKDIR }}/L1-raw/
          retention-days: 1
          if-no-files-found: ignore

  # ── Phase 3-8: Normalize, Publish, Validate ──────────
  process:
    needs: extract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r .github/scripts/requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake libjson-c-dev pkg-config
      - name: Download L0 (for manifest/registry)
        uses: actions/download-artifact@v4
        with:
          name: L0-repos
          path: ${{ env.WORKDIR }}
      - name: Download all L1 results
        uses: actions/download-artifact@v4
        with:
          pattern: L1-*
          path: ${{ env.WORKDIR }}/L1-raw/
          merge-multiple: true
      - name: Cache AI Summaries
        uses: actions/cache@v4
        with:
          path: ai-summaries-cache.json
          key: ai-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ai-cache-${{ runner.os }}-
      - name: Prepare Baseline
        run: |
          mkdir -p baseline
          if [ -f "$PUBLISH_DIR/signature-inventory.json" ]; then
            cp "$PUBLISH_DIR/signature-inventory.json" baseline/
            echo "Baseline inventory found and staged."
          else
            echo "No baseline inventory found in $PUBLISH_DIR."
          fi
      - name: Build ucode validation binary
        run: |
          cmake -S "$WORKDIR/repo-ucode" -B "$WORKDIR/repo-ucode/build-host" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$WORKDIR/repo-ucode/build-install" \
            -DDEBUG_SUPPORT=OFF \
            -DFS_SUPPORT=OFF \
            -DIO_SUPPORT=OFF \
            -DMATH_SUPPORT=OFF \
            -DUBUS_SUPPORT=OFF \
            -DUCI_SUPPORT=OFF \
            -DRTNL_SUPPORT=OFF \
            -DNL80211_SUPPORT=OFF \
            -DRESOLV_SUPPORT=OFF \
            -DSTRUCT_SUPPORT=OFF \
            -DULOOP_SUPPORT=OFF \
            -DLOG_SUPPORT=OFF \
            -DSOCKET_SUPPORT=OFF \
            -DZLIB_SUPPORT=OFF \
            -DDIGEST_SUPPORT=OFF \
            -DDIGEST_SUPPORT_EXTENDED=OFF
          cmake --build "$WORKDIR/repo-ucode/build-host" --parallel
          cmake --install "$WORKDIR/repo-ucode/build-host"
          echo "$WORKDIR/repo-ucode/build-install/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=$WORKDIR/repo-ucode/build-install/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - name: Normalize L2
        run: python .github/scripts/openwrt-docs4ai-03-normalize-semantic.py
      - name: "AI summaries (Optional)"
        env:
          SKIP_AI: ${{ inputs.skip_ai || 'false' }}
          MAX_AI_FILES: ${{ inputs.max_ai_files || '40' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/openwrt-docs4ai-04-generate-ai-summaries.py
      - name: Assemble publishable references (05a)
        run: python .github/scripts/openwrt-docs4ai-05a-assemble-references.py
      - name: Generate publication companion outputs (05b-05d)
        env:
          BASELINE_DIR: ${{ github.workspace }}/baseline
        run: |
          python .github/scripts/openwrt-docs4ai-05b-generate-agents-and-readme.py
          python .github/scripts/openwrt-docs4ai-05c-generate-ucode-ide-schemas.py
          python .github/scripts/openwrt-docs4ai-05d-generate-api-drift-changelog.py
      - name: Generate LLM routing indexes (06)
        run: python .github/scripts/openwrt-docs4ai-06-generate-llm-routing-indexes.py
      - name: Generate web landing page (07)
        run: python .github/scripts/openwrt-docs4ai-07-generate-web-index.py
      - name: Validate published output (08)
        run: python .github/scripts/openwrt-docs4ai-08-validate-output.py
      - name: Upload Final Staging
        uses: actions/upload-artifact@v4
        with:
          name: final-staging
          path: ${{ env.OUTDIR }}

  # ── Phase 6-7: Deploy ────────────────────────────────
  deploy:
    needs: process
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Staging
        uses: actions/download-artifact@v4
        with:
          name: final-staging
          path: ${{ env.OUTDIR }}
      - name: Promote & Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Promoting staging to $PUBLISH_DIR"
          rsync -a --delete "$OUTDIR/" "$GITHUB_WORKSPACE/$PUBLISH_DIR/"
          git add "$PUBLISH_DIR/"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: v12 auto-update $(date -u +%Y-%m-%d)"
            git push
          fi
      - name: Prepare Public Pages
        run: |
          mkdir -p public
          # Exclude L1/L2 intermediate layers from public site
          rsync -a --exclude="L1-raw" --exclude="L2-semantic" "$OUTDIR/" public/
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
