name: openwrt-docs4ai-pipeline

on:
  schedule:
    - cron: "0 13 1 * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_wiki:
        description: 'Skip wiki scraping'
        type: boolean
        default: false
      skip_buildroot:
        description: 'Skip buildroot/examples extraction'
        type: boolean
        default: false
      skip_ai:
        description: 'Skip AI summarization'
        type: boolean
        default: false
      max_ai_files:
        description: 'Max files for AI summarization'
        type: number
        default: 40

permissions:
  contents: read

env:
  PIPELINE_RUN_DIR: ${{ github.workspace }}/tmp/pipeline-ci
  WORKDIR: ${{ github.workspace }}/tmp/pipeline-ci/downloads
  PROCESSED_DIR: ${{ github.workspace }}/tmp/pipeline-ci/processed
  STAGED_DIR: ${{ github.workspace }}/tmp/pipeline-ci/staged
  OUTDIR: ${{ github.workspace }}/tmp/pipeline-ci/staged
  DIST_PAGES_REPO: openwrt-docs4ai/openwrt-docs4ai.github.io
  DIST_RELEASE_REPO: openwrt-docs4ai/corpus
  DIST_TARGET_BRANCH: main
  DIST_ZIP_ROOT_DIR: openwrt-docs4ai

jobs:
  # ── Phase 0: Source Validation Gate ───────────────────
  validate_source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
          cache: 'pip'
      - uses: actions/setup-go@main
        with:
          go-version: "1.24"
      - name: Install validation tools
        run: |
          pip install -r .github/scripts/requirements.txt ruff pyright
          # TODO: return to actionlint@latest after this job moves to Go 1.25+.
          # actionlint v1.7.12+ requires Go 1.25+, while this job runs on Go 1.24.
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run source validation
        run: python tests/check_linting.py --strict --result-root tmp/ci/lint-review/current
      - name: Upload lint review artifact
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: lint-review
          path: ${{ github.workspace }}/tmp/ci/lint-review/current/
          retention-days: 7
      - name: Append source validation summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("tmp/ci/lint-review/current/summary.json")
          lines = ["# Source Validation", ""]
          if summary_path.is_file():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))
              lines.append(f"- status: {summary.get('status', 'unknown')}")
              lines.append(f"- strict_mode: {summary.get('strict_mode', False)}")
              lines.append("")
              lines.append("| check | status | exit_code |")
              lines.append("| --- | --- | ---: |")
              for result in summary.get("results", []):
                  lines.append(
                      f"| {result.get('name', 'unknown')} | {result.get('status', 'unknown')} | {result.get('exit_code', 'n/a')} |"
                  )
          else:
              lines.append("- lint-review summary unavailable")

          step_summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with step_summary.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

  # ── Phase 1: Setup & Clone ───────────────────────────
  initialize:
    needs: validate_source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt
      - name: Create directories
        run: mkdir -p "$PIPELINE_RUN_DIR" "$WORKDIR" "$PROCESSED_DIR" "$STAGED_DIR"
      - name: Clone repositories
        env:
          SKIP_BUILDROOT: ${{ inputs.skip_buildroot || 'false' }}
          GITHUB_ENV: ${{ github.env }}
        run: python .github/scripts/openwrt-docs4ai-01-clone-repos.py
      - name: Upload L0 Repos & Manifest
        uses: actions/upload-artifact@main
        with:
          name: L0-repos
          path: |
            ${{ env.WORKDIR }}/repo-*
            ${{ env.WORKDIR }}/repo-manifest.json
          retention-days: 1

  # ── Phase 2a: Wiki Extraction (Parallel with initialize) ──
  extract_wiki:
    needs: validate_source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r .github/scripts/requirements.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
      - name: Mark extractor start
        run: echo "EXTRACT_STARTED_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
      - name: Cache Wiki Metadata
        uses: actions/cache@main
        with:
          path: |
            ${{ env.WORKDIR }}/.cache
            ${{ env.PROCESSED_DIR }}/L1-raw/wiki
          key: wiki-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            wiki-cache-${{ runner.os }}-
      - name: Extract 02a-scrape-wiki.py
        id: extract_run
        continue-on-error: true
        env:
          SKIP_WIKI: ${{ inputs.skip_wiki || 'false' }}
        run: python .github/scripts/openwrt-docs4ai-02a-scrape-wiki.py
      - name: Evaluate extractor output contract (02a)
        if: always()
        id: extract_contract
        env:
          SCRIPT_NAME: 02a-scrape-wiki.py
          MODULE_NAME: wiki
          EXTRACT_OUTCOME: ${{ steps.extract_run.outcome }}
          SKIP_WIKI: ${{ inputs.skip_wiki || 'false' }}
        run: |
          set -euo pipefail
          started_epoch="${EXTRACT_STARTED_EPOCH:-$(date +%s)}"
          ended_epoch="$(date +%s)"
          duration_seconds=$(( ended_epoch - started_epoch ))

          module_dir="$PROCESSED_DIR/L1-raw/$MODULE_NAME"
          md_count=0
          meta_count=0
          if [ -d "$module_dir" ]; then
            md_count=$(find "$module_dir" -type f -name '*.md' | wc -l | awk '{print $1}')
            meta_count=$(find "$module_dir" -type f -name '*.meta.json' | wc -l | awk '{print $1}')
          fi

          expected_skip="false"
          skip_reason=""
          if [ "$SKIP_WIKI" = "true" ]; then
            expected_skip="true"
            skip_reason="SKIP_WIKI=true"
          fi

          contract_status="ok"
          contract_fail="false"
          if [ "$EXTRACT_OUTCOME" != "success" ]; then
            contract_status="extractor_failed"
            contract_fail="true"
          elif [ "$md_count" -gt 0 ]; then
            contract_status="ok"
          elif [ "$expected_skip" = "true" ]; then
            contract_status="skipped_expected"
          else
            contract_status="unexpected_empty"
            contract_fail="true"
          fi

          status_path="$WORKDIR/extract-status/${SCRIPT_NAME}.json"
          mkdir -p "$WORKDIR/extract-status"

          export CONTRACT_STATUS="$contract_status"
          export CONTRACT_FAIL="$contract_fail"
          export EXPECTED_SKIP="$expected_skip"
          export SKIP_REASON="$skip_reason"
          export MD_COUNT="$md_count"
          export META_COUNT="$meta_count"
          export STARTED_EPOCH="$started_epoch"
          export ENDED_EPOCH="$ended_epoch"
          export DURATION_SECONDS="$duration_seconds"
          export STATUS_PATH="$status_path"

          python - <<'PY'
          import json
          import os

          payload = {
              "script": os.environ["SCRIPT_NAME"],
              "module": os.environ["MODULE_NAME"],
              "outcome": os.environ["EXTRACT_OUTCOME"],
              "contract_status": os.environ["CONTRACT_STATUS"],
              "contract_fail": os.environ["CONTRACT_FAIL"] == "true",
              "expected_skip": os.environ["EXPECTED_SKIP"] == "true",
              "skip_reason": os.environ["SKIP_REASON"] or None,
              "md_count": int(os.environ["MD_COUNT"]),
              "meta_count": int(os.environ["META_COUNT"]),
              "started_epoch": int(os.environ["STARTED_EPOCH"]),
              "ended_epoch": int(os.environ["ENDED_EPOCH"]),
              "duration_seconds": int(os.environ["DURATION_SECONDS"]),
          }

          with open(os.environ["STATUS_PATH"], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
          PY

          echo "contract_status=$contract_status" >> "$GITHUB_OUTPUT"
          echo "contract_fail=$contract_fail" >> "$GITHUB_OUTPUT"
      - name: Upload L1 Artifacts (02a)
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: L1-02a-scrape-wiki.py
          path: ${{ env.PROCESSED_DIR }}/L1-raw/
          retention-days: 1
          if-no-files-found: ignore
      - name: Upload extractor status (02a)
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: extract-status-02a-scrape-wiki.py
          path: ${{ env.WORKDIR }}/extract-status/02a-scrape-wiki.py.json
          retention-days: 7
      - name: Enforce extractor output contract (02a)
        if: steps.extract_contract.outputs.contract_fail == 'true'
        run: |
          echo "Extractor contract failed for 02a-scrape-wiki.py with status=${{ steps.extract_contract.outputs.contract_status }}"
          exit 1

  # ── Phase 2a+: Cookbook Ingestion (Parallel with initialize) ──
  extract_cookbook:
    needs: validate_source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt
      - name: Mark extractor start
        run: echo "EXTRACT_STARTED_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
      - name: Extract 02i-ingest-cookbook.py
        id: extract_run
        continue-on-error: true
        run: python .github/scripts/openwrt-docs4ai-02i-ingest-cookbook.py
      - name: Evaluate extractor output contract (02i)
        if: always()
        id: extract_contract
        env:
          SCRIPT_NAME: 02i-ingest-cookbook.py
          MODULE_NAME: cookbook
          EXTRACT_OUTCOME: ${{ steps.extract_run.outcome }}
        run: |
          set -euo pipefail
          started_epoch="${EXTRACT_STARTED_EPOCH:-$(date +%s)}"
          ended_epoch="$(date +%s)"
          duration_seconds=$(( ended_epoch - started_epoch ))

          module_dir="$PROCESSED_DIR/L1-raw/$MODULE_NAME"
          md_count=0
          meta_count=0
          if [ -d "$module_dir" ]; then
            md_count=$(find "$module_dir" -type f -name '*.md' | wc -l | awk '{print $1}')
            meta_count=$(find "$module_dir" -type f -name '*.meta.json' | wc -l | awk '{print $1}')
          fi

          contract_status="ok"
          contract_fail="false"
          if [ "$EXTRACT_OUTCOME" != "success" ]; then
            contract_status="extractor_failed"
            contract_fail="true"
          elif [ "$md_count" -gt 0 ]; then
            contract_status="ok"
          else
            contract_status="unexpected_empty"
            contract_fail="true"
          fi

          status_path="$WORKDIR/extract-status/${SCRIPT_NAME}.json"
          mkdir -p "$WORKDIR/extract-status"

          export CONTRACT_STATUS="$contract_status"
          export CONTRACT_FAIL="$contract_fail"
          export MD_COUNT="$md_count"
          export META_COUNT="$meta_count"
          export STARTED_EPOCH="$started_epoch"
          export ENDED_EPOCH="$ended_epoch"
          export DURATION_SECONDS="$duration_seconds"
          export STATUS_PATH="$status_path"

          python - <<'PY'
          import json
          import os

          payload = {
              "script": os.environ["SCRIPT_NAME"],
              "module": os.environ["MODULE_NAME"],
              "outcome": os.environ["EXTRACT_OUTCOME"],
              "contract_status": os.environ["CONTRACT_STATUS"],
              "contract_fail": os.environ["CONTRACT_FAIL"] == "true",
              "expected_skip": False,
              "skip_reason": None,
              "md_count": int(os.environ["MD_COUNT"]),
              "meta_count": int(os.environ["META_COUNT"]),
              "started_epoch": int(os.environ["STARTED_EPOCH"]),
              "ended_epoch": int(os.environ["ENDED_EPOCH"]),
              "duration_seconds": int(os.environ["DURATION_SECONDS"]),
          }

          with open(os.environ["STATUS_PATH"], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
          PY

          echo "contract_status=$contract_status" >> "$GITHUB_OUTPUT"
          echo "contract_fail=$contract_fail" >> "$GITHUB_OUTPUT"
      - name: Upload L1 Artifacts (02i)
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: L1-02i-ingest-cookbook.py
          path: ${{ env.PROCESSED_DIR }}/L1-raw/
          retention-days: 1
          if-no-files-found: ignore
      - name: Upload extractor status (02i)
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: extract-status-02i-ingest-cookbook.py
          path: ${{ env.WORKDIR }}/extract-status/02i-ingest-cookbook.py.json
          retention-days: 7
      - name: Enforce extractor output contract (02i)
        if: steps.extract_contract.outputs.contract_fail == 'true'
        run: |
          echo "Extractor contract failed for 02i-ingest-cookbook.py with status=${{ steps.extract_contract.outputs.contract_status }}"
          exit 1

  # ── Phase 2b: Repo-backed Extraction (Matrix) ─────────────
  extract:
    needs: initialize
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - script: "02b-scrape-ucode.py"
            module: "ucode"
            skip_with_buildroot: "false"
          - script: "02c-scrape-jsdoc.py"
            module: "luci"
            skip_with_buildroot: "false"
          - script: "02d-scrape-core-packages.py"
            module: "openwrt-core"
            skip_with_buildroot: "true"
          - script: "02e-scrape-example-packages.py"
            module: "luci-examples"
            skip_with_buildroot: "false"
          - script: "02f-scrape-procd-api.py"
            module: "procd"
            skip_with_buildroot: "true"
          - script: "02g-scrape-uci-schemas.py"
            module: "uci"
            skip_with_buildroot: "true"
          - script: "02h-scrape-hotplug-events.py"
            module: "openwrt-hotplug"
            skip_with_buildroot: "true"
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt
      - name: Install jsdoc-to-markdown (02b/02c only)
        if: matrix.script == '02c-scrape-jsdoc.py' || matrix.script == '02b-scrape-ucode.py'
        run: npm install -g jsdoc-to-markdown@9.1.1
      - name: Mark extractor start
        run: echo "EXTRACT_STARTED_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
      - name: Download L0
        uses: actions/download-artifact@main
        with:
          name: L0-repos
          path: ${{ env.WORKDIR }}
      - name: Extract ${{ matrix.script }}
        id: extract_run
        continue-on-error: true
        env:
          SKIP_WIKI: ${{ inputs.skip_wiki || 'false' }}
          SKIP_BUILDROOT: ${{ inputs.skip_buildroot || 'false' }}
        run: python .github/scripts/openwrt-docs4ai-${{ matrix.script }}
      - name: Evaluate extractor output contract (${{ matrix.script }})
        if: always()
        id: extract_contract
        env:
          SCRIPT_NAME: ${{ matrix.script }}
          MODULE_NAME: ${{ matrix.module }}
          SKIP_ON_BUILDROOT: ${{ matrix.skip_with_buildroot }}
          SKIP_BUILDROOT: ${{ inputs.skip_buildroot || 'false' }}
          EXTRACT_OUTCOME: ${{ steps.extract_run.outcome }}
        run: |
          set -euo pipefail
          started_epoch="${EXTRACT_STARTED_EPOCH:-$(date +%s)}"
          ended_epoch="$(date +%s)"
          duration_seconds=$(( ended_epoch - started_epoch ))

          module_dir="$PROCESSED_DIR/L1-raw/$MODULE_NAME"
          md_count=0
          meta_count=0
          if [ -d "$module_dir" ]; then
            md_count=$(find "$module_dir" -type f -name '*.md' | wc -l | awk '{print $1}')
            meta_count=$(find "$module_dir" -type f -name '*.meta.json' | wc -l | awk '{print $1}')
          fi

          expected_skip="false"
          skip_reason=""
          if [ "$SKIP_BUILDROOT" = "true" ] && [ "$SKIP_ON_BUILDROOT" = "true" ]; then
            expected_skip="true"
            skip_reason="SKIP_BUILDROOT=true"
          fi

          contract_status="ok"
          contract_fail="false"
          if [ "$EXTRACT_OUTCOME" != "success" ]; then
            contract_status="extractor_failed"
            contract_fail="true"
          elif [ "$md_count" -gt 0 ]; then
            contract_status="ok"
          elif [ "$expected_skip" = "true" ]; then
            contract_status="skipped_expected"
          else
            contract_status="unexpected_empty"
            contract_fail="true"
          fi

          status_path="$WORKDIR/extract-status/${SCRIPT_NAME}.json"
          mkdir -p "$WORKDIR/extract-status"

          export CONTRACT_STATUS="$contract_status"
          export CONTRACT_FAIL="$contract_fail"
          export EXPECTED_SKIP="$expected_skip"
          export SKIP_REASON="$skip_reason"
          export MD_COUNT="$md_count"
          export META_COUNT="$meta_count"
          export STARTED_EPOCH="$started_epoch"
          export ENDED_EPOCH="$ended_epoch"
          export DURATION_SECONDS="$duration_seconds"
          export STATUS_PATH="$status_path"

          python - <<'PY'
          import json
          import os

          payload = {
              "script": os.environ["SCRIPT_NAME"],
              "module": os.environ["MODULE_NAME"],
              "outcome": os.environ["EXTRACT_OUTCOME"],
              "contract_status": os.environ["CONTRACT_STATUS"],
              "contract_fail": os.environ["CONTRACT_FAIL"] == "true",
              "expected_skip": os.environ["EXPECTED_SKIP"] == "true",
              "skip_reason": os.environ["SKIP_REASON"] or None,
              "md_count": int(os.environ["MD_COUNT"]),
              "meta_count": int(os.environ["META_COUNT"]),
              "started_epoch": int(os.environ["STARTED_EPOCH"]),
              "ended_epoch": int(os.environ["ENDED_EPOCH"]),
              "duration_seconds": int(os.environ["DURATION_SECONDS"]),
          }

          with open(os.environ["STATUS_PATH"], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
          PY

          echo "contract_status=$contract_status" >> "$GITHUB_OUTPUT"
          echo "contract_fail=$contract_fail" >> "$GITHUB_OUTPUT"
      - name: Upload L1 Artifacts
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: L1-${{ matrix.script }}
          path: ${{ env.PROCESSED_DIR }}/L1-raw/
          retention-days: 1
          if-no-files-found: ignore
      - name: Upload extractor status (${{ matrix.script }})
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: extract-status-${{ matrix.script }}
          path: ${{ env.WORKDIR }}/extract-status/${{ matrix.script }}.json
          retention-days: 7
      - name: Enforce extractor output contract (${{ matrix.script }})
        if: steps.extract_contract.outputs.contract_fail == 'true'
        run: |
          echo "Extractor contract failed for ${{ matrix.script }} with status=${{ steps.extract_contract.outputs.contract_status }}"
          exit 1

  # ── Phase 2c: Extract Summary (always) ────────────────
  extract_summary:
    needs: [extract, extract_wiki, extract_cookbook]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
      - name: Prepare extract summary workspace
        run: |
          mkdir -p "$WORKDIR/extract-status"
          mkdir -p "$WORKDIR/extract-summary"
      - name: Download extractor status manifests
        continue-on-error: true
        uses: actions/download-artifact@main
        with:
          pattern: extract-status-*
          path: ${{ env.WORKDIR }}/extract-status/
          merge-multiple: true
      - name: Build extract summary
        env:
          EXTRACT_REPO_RESULT: ${{ needs.extract.result }}
          EXTRACT_WIKI_RESULT: ${{ needs.extract_wiki.result }}
          EXTRACT_COOKBOOK_RESULT: ${{ needs.extract_cookbook.result }}
        run: |
          python - <<'PY'
          import json
          import os
          from collections import Counter
          from pathlib import Path

          workdir = Path(os.environ["WORKDIR"])
          status_dir = workdir / "extract-status"
          summary_dir = workdir / "extract-summary"
          summary_dir.mkdir(parents=True, exist_ok=True)

          status_files = sorted(status_dir.glob("*.json"))
          statuses = []
          for status_file in status_files:
              try:
                  payload = json.loads(status_file.read_text(encoding="utf-8"))
                  statuses.append(payload)
              except Exception as exc:
                  statuses.append(
                      {
                          "script": status_file.name,
                          "module": "unknown",
                          "outcome": "error",
                          "contract_status": "status_parse_error",
                          "contract_fail": True,
                          "expected_skip": False,
                          "skip_reason": f"status parse error: {exc}",
                          "md_count": 0,
                          "meta_count": 0,
                          "duration_seconds": 0,
                      }
                  )

          statuses.sort(key=lambda item: item.get("script", ""))
          contract_counts = Counter(item.get("contract_status", "unknown") for item in statuses)
          contract_failures = [item for item in statuses if item.get("contract_fail")]

          summary_payload = {
              "extract_repo_result": os.environ.get("EXTRACT_REPO_RESULT", "unknown"),
              "extract_wiki_result": os.environ.get("EXTRACT_WIKI_RESULT", "unknown"),
              "extract_cookbook_result": os.environ.get("EXTRACT_COOKBOOK_RESULT", "unknown"),
              "extractor_count": len(statuses),
              "contract_status_counts": dict(contract_counts),
              "contract_failures": len(contract_failures),
              "extractors": statuses,
          }

          json_path = summary_dir / "extract-summary.json"
          json_path.write_text(json.dumps(summary_payload, indent=2), encoding="utf-8")

          lines = []
          lines.append("# Extract Summary")
          lines.append("")
          lines.append(f"- extract job result: {summary_payload['extract_repo_result']}")
          lines.append(f"- extract_wiki job result: {summary_payload['extract_wiki_result']}")
          lines.append(f"- extract_cookbook job result: {summary_payload['extract_cookbook_result']}")
          lines.append(f"- extractor status manifests: {summary_payload['extractor_count']}")
          lines.append(f"- contract failures: {summary_payload['contract_failures']}")
          lines.append("")
          lines.append("| script | module | outcome | contract | md | meta | duration_s | note |")
          lines.append("| --- | --- | --- | --- | ---: | ---: | ---: | --- |")
          for item in statuses:
              note = item.get("skip_reason") or ""
              lines.append(
                  "| {script} | {module} | {outcome} | {contract} | {md} | {meta} | {duration} | {note} |".format(
                      script=item.get("script", ""),
                      module=item.get("module", ""),
                      outcome=item.get("outcome", ""),
                      contract=item.get("contract_status", ""),
                      md=item.get("md_count", 0),
                      meta=item.get("meta_count", 0),
                      duration=item.get("duration_seconds", 0),
                      note=note.replace("|", "/"),
                  )
              )

          md_path = summary_dir / "extract-summary.md"
          md_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
      - name: Upload extract summary
        uses: actions/upload-artifact@main
        with:
          name: extract-summary
          path: ${{ env.WORKDIR }}/extract-summary/
          retention-days: 7
      - name: Append extract summary to step summary
        run: cat "$WORKDIR/extract-summary/extract-summary.md" >> "$GITHUB_STEP_SUMMARY"

  # ── Phase 3-8: Normalize, Publish, Validate ──────────
  process:
    needs: [extract, extract_wiki]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 2
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r .github/scripts/requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake libjson-c-dev pkg-config
      - name: Download L0 (for manifest/registry)
        uses: actions/download-artifact@main
        with:
          name: L0-repos
          path: ${{ env.WORKDIR }}
      - name: Download all L1 results
        uses: actions/download-artifact@main
        with:
          pattern: L1-*
          path: ${{ env.PROCESSED_DIR }}/L1-raw/
          merge-multiple: true
      - name: Download extract summary
        continue-on-error: true
        uses: actions/download-artifact@main
        with:
          name: extract-summary
          path: ${{ env.WORKDIR }}/extract-summary/
      - name: Cache AI Summaries
        uses: actions/cache@main
        with:
          path: ai-summaries-cache.json
          key: ai-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ai-cache-${{ runner.os }}-
      - name: Prepare Baseline
        run: |
          mkdir -p baseline
          if [ -f "$STAGED_DIR/signature-inventory.json" ]; then
            cp "$STAGED_DIR/signature-inventory.json" baseline/
            echo "Baseline inventory found and staged."
          else
            echo "No baseline inventory found in $STAGED_DIR."
          fi
      - name: Build ucode validation binary
        run: |
          cmake -S "$WORKDIR/repo-ucode" -B "$WORKDIR/repo-ucode/build-host" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$WORKDIR/repo-ucode/build-install" \
            -DDEBUG_SUPPORT=OFF \
            -DFS_SUPPORT=OFF \
            -DIO_SUPPORT=OFF \
            -DMATH_SUPPORT=OFF \
            -DUBUS_SUPPORT=OFF \
            -DUCI_SUPPORT=OFF \
            -DRTNL_SUPPORT=OFF \
            -DNL80211_SUPPORT=OFF \
            -DRESOLV_SUPPORT=OFF \
            -DSTRUCT_SUPPORT=OFF \
            -DULOOP_SUPPORT=OFF \
            -DLOG_SUPPORT=OFF \
            -DSOCKET_SUPPORT=OFF \
            -DZLIB_SUPPORT=OFF \
            -DDIGEST_SUPPORT=OFF \
            -DDIGEST_SUPPORT_EXTENDED=OFF
          cmake --build "$WORKDIR/repo-ucode/build-host" --parallel
          cmake --install "$WORKDIR/repo-ucode/build-host"
          echo "$WORKDIR/repo-ucode/build-install/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=$WORKDIR/repo-ucode/build-install/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - name: Normalize L2
        run: |
          _T=$(date +%s)
          python .github/scripts/openwrt-docs4ai-03-normalize-semantic.py
          echo "PROC_TIMER_03=$(($(date +%s) - _T))" >> "$GITHUB_ENV"
      - name: "AI summaries (Optional)"
        id: ai_summaries
        env:
          SKIP_AI: ${{ inputs.skip_ai || 'false' }}
          MAX_AI_FILES: ${{ inputs.max_ai_files || '40' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          mkdir -p "$WORKDIR/run-summary"
          _T=$(date +%s)
          python .github/scripts/openwrt-docs4ai-04-generate-ai-summaries.py | tee "$WORKDIR/run-summary/ai-stage.log"
          echo "PROC_TIMER_04=$(($(date +%s) - _T))" >> "$GITHUB_ENV"
      - name: Assemble publishable references (05a)
        run: |
          _T=$(date +%s)
          python .github/scripts/openwrt-docs4ai-05a-assemble-references.py
          echo "PROC_TIMER_05A=$(($(date +%s) - _T))" >> "$GITHUB_ENV"
      - name: Generate publication companion outputs (05b-05e)
        env:
          BASELINE_DIR: ${{ github.workspace }}/baseline
        run: |
          _T=$(date +%s)
          python .github/scripts/openwrt-docs4ai-05b-generate-agents-and-readme.py
          python .github/scripts/openwrt-docs4ai-05c-generate-ucode-ide-schemas.py
          python .github/scripts/openwrt-docs4ai-05d-generate-api-drift-changelog.py
          python .github/scripts/openwrt-docs4ai-05e-generate-luci-dts.py
          echo "PROC_TIMER_05BCDE=$(($(date +%s) - _T))" >> "$GITHUB_ENV"
      - name: Generate LLM routing indexes (06)
        run: |
          _T=$(date +%s)
          python .github/scripts/openwrt-docs4ai-06-generate-llm-routing-indexes.py
          echo "PROC_TIMER_06=$(($(date +%s) - _T))" >> "$GITHUB_ENV"
      - name: Generate web landing page (07)
        run: |
          _T=$(date +%s)
          python .github/scripts/openwrt-docs4ai-07-generate-web-index.py
          echo "PROC_TIMER_07=$(($(date +%s) - _T))" >> "$GITHUB_ENV"
      - name: Validate published output (08)
        id: validate_output
        run: |
          _T=$(date +%s)
          python .github/scripts/openwrt-docs4ai-08-validate-output.py
          echo "PROC_TIMER_08=$(($(date +%s) - _T))" >> "$GITHUB_ENV"
      - name: Build distribution packages (09)
        run: |
          _T=$(date +%s)
          python .github/scripts/openwrt-docs4ai-09-build-packages.py --ci
          echo "PROC_TIMER_09=$(($(date +%s) - _T))" >> "$GITHUB_ENV"
      - name: Validate staging contract and build process summary
        id: process_contract
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          outdir = Path(os.environ["OUTDIR"])
          processed_dir = Path(os.environ["PROCESSED_DIR"])
          workdir = Path(os.environ["WORKDIR"])
          validate_output_outcome = "${{ steps.validate_output.outcome }}" or "unknown"
          summary_dir = workdir / "run-summary"
          summary_dir.mkdir(parents=True, exist_ok=True)

          required_paths = [
              Path("AGENTS.md"),
              Path("README.md"),
              Path("llms.txt"),
              Path("llms-full.txt"),
              Path("index.html"),
              Path("signature-inventory.json"),
              Path("CHANGES.md"),
              Path("changelog.json"),
              Path("release-tree") / "AGENTS.md",
              Path("release-tree") / "README.md",
              Path("release-tree") / "llms.txt",
              Path("release-tree") / "llms-full.txt",
              Path("release-tree") / "index.html",
              Path("support-tree") / "manifests" / "repo-manifest.json",
              Path("support-tree") / "manifests" / "cross-link-registry.json",
              Path("support-tree") / "telemetry" / "CHANGES.md",
              Path("support-tree") / "telemetry" / "changelog.json",
              Path("support-tree") / "telemetry" / "signature-inventory.json",
          ]

          missing = [path.as_posix() for path in required_paths if not (outdir / path).is_file()]

          l1_md = len(list((processed_dir / "L1-raw").glob("**/*.md"))) if (processed_dir / "L1-raw").exists() else 0
          l1_meta = len(list((processed_dir / "L1-raw").glob("**/*.meta.json"))) if (processed_dir / "L1-raw").exists() else 0
          l2_md = len(list((processed_dir / "L2-semantic").glob("**/*.md"))) if (processed_dir / "L2-semantic").exists() else 0
          release_tree = outdir / "release-tree"
          support_tree = outdir / "support-tree"
          module_refs = len(list(release_tree.glob("*/bundled-reference.md"))) if release_tree.exists() else 0
          package_zips = sorted((outdir / "packages").glob("*.zip")) if (outdir / "packages").exists() else []

          if len(package_zips) != 1:
              missing.append("packages/*.zip")
          elif package_zips[0].stat().st_size == 0:
              missing.append("packages/*.zip (empty)")

          ai_log_path = summary_dir / "ai-stage.log"
          ai: dict[str, object] = {
              "status": "not-available",
              "log_present": ai_log_path.is_file(),
              "timers": {},
              "counters": {},
          }

          if ai_log_path.is_file():
              ai["status"] = "logged"
              ai_text = ai_log_path.read_text(encoding="utf-8", errors="replace")
              ai_lines = [line.strip() for line in ai_text.splitlines() if line.strip()]

              if any(line.startswith("[04] SKIP:") for line in ai_lines):
                  ai["status"] = "skipped"

              timer_line = next(
                  (
                      line for line in ai_lines
                      if line.startswith("[04] TIMER:") and "total_seconds=" in line
                  ),
                  None,
              )
              if timer_line:
                  timers: dict[str, object] = {}
                  for key, raw in re.findall(r"([a-z_]+)=([0-9]+(?:\.[0-9]+)?)", timer_line):
                      if "." in raw:
                          timers[key] = float(raw)
                      else:
                          timers[key] = int(raw)
                  ai["timers"] = timers
                  if ai["status"] == "logged":
                      ai["status"] = "timed"

              complete_line = next((line for line in ai_lines if line.startswith("[04] Complete:")), None)
              if complete_line:
                  match = re.search(
                      r"Complete:\s+(\d+) enriched \((\d+) API-generated, (\d+) migrated from legacy cache, (\d+) applied stale\), (\d+) already had summaries, (\d+) too short\.",
                      complete_line,
                  )
                  if match:
                      ai["counters"] = {
                          "applied": int(match.group(1)),
                          "generated_via_api": int(match.group(2)),
                          "migrated_from_legacy": int(match.group(3)),
                          "stale_applied": int(match.group(4)),
                          "skipped_already": int(match.group(5)),
                          "skipped_short": int(match.group(6)),
                      }

          payload = {
              "contract_ok": (not missing) and validate_output_outcome == "success",
              "missing_required_files": missing,
              "validate_output_outcome": validate_output_outcome,
              "counts": {
                  "l1_raw_markdown": l1_md,
                  "l1_metadata": l1_meta,
                  "l2_semantic_markdown": l2_md,
                  "module_bundled_references": module_refs,
                  "package_zip_count": len(package_zips),
              },
              "ai": ai,
          }

          ai_timers = ai["timers"] if isinstance(ai.get("timers"), dict) else {}
          ai_counters = ai["counters"] if isinstance(ai.get("counters"), dict) else {}

          stage_timer_keys = [
              ("PROC_TIMER_03",    "03-normalize"),
              ("PROC_TIMER_04",    "04-ai-summaries"),
              ("PROC_TIMER_05A",   "05a-assemble"),
              ("PROC_TIMER_05BCDE", "05bcde-companions"),
              ("PROC_TIMER_06",    "06-llm-indexes"),
              ("PROC_TIMER_07",    "07-web-index"),
              ("PROC_TIMER_08",    "08-validate"),
                ("PROC_TIMER_09",    "09-packages"),
          ]
          stage_timings: dict[str, int] = {}
          for env_key, label in stage_timer_keys:
              raw = os.environ.get(env_key, "").strip()
              if raw.isdigit():
                  stage_timings[label] = int(raw)

          payload["stage_timings"] = stage_timings

          (summary_dir / "process-summary.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")

          lines = [
              "# Process Summary",
              "",
              f"- contract_ok: {str(payload['contract_ok']).lower()}",
              f"- validate_output_outcome: {validate_output_outcome}",
              f"- l1_raw_markdown: {l1_md}",
              f"- l1_metadata: {l1_meta}",
              f"- l2_semantic_markdown: {l2_md}",
              f"- module_bundled_references: {module_refs}",
              f"- package_zip_count: {len(package_zips)}",
              f"- ai_status: {ai.get('status', 'not-available')}",
              f"- ai_total_seconds: {ai_timers.get('total_seconds', 'n/a')}",
              f"- ai_api_calls: {ai_timers.get('api_calls', 'n/a')}",
              f"- ai_enriched: {ai_counters.get('applied', 'n/a')}",
              f"- ai_generated_via_api: {ai_counters.get('generated_via_api', 'n/a')}",
          ]
          if missing:
              lines.append(f"- missing_required_files: {', '.join(missing)}")
          else:
              lines.append("- missing_required_files: none")

          if stage_timings:
              total_secs = sum(stage_timings.values())
              lines += [
                  "",
                  "## Process Stage Timings",
                  "",
                  "| Stage | Seconds |",
                  "|-------|---------|",
              ]
              for label, secs in stage_timings.items():
                  lines.append(f"| {label} | {secs} |")
              lines.append(f"| **total** | **{total_secs}** |")

          (summary_dir / "process-summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")

          if missing:
              print("Missing required staging files:")
              for item in missing:
                  print(f"- {item}")
              sys.exit(1)
          PY
      - name: Upload process summary
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: process-summary
          path: ${{ env.WORKDIR }}/run-summary/
          retention-days: 7
          if-no-files-found: ignore
      - name: Append process summary to step summary
        if: always()
        run: |
          if [ -f "$WORKDIR/run-summary/process-summary.md" ]; then
            cat "$WORKDIR/run-summary/process-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Enforce staging contract
        if: steps.process_contract.outcome != 'success'
        run: |
          echo "Staging contract failed. See process-summary artifact for details."
          exit 1
      - name: Upload Final Staging
        uses: actions/upload-artifact@main
        with:
          name: final-staging
          path: ${{ env.OUTDIR }}

  # ── Deploy: Publish Outputs ──────────────────────────
  deploy:
    needs: process
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: openwrt-docs4ai-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - name: Download Staging
        uses: actions/download-artifact@main
        with:
          name: final-staging
          path: ${{ env.STAGED_DIR }}
      # --- Publication targets ---
      # The gh-pages push below triggers GitHub's built-in pages-build-deployment
      # on LuminairPrime/openwrt-docs4ai-pipeline (test preview).
      # The external distribution pushes (further down) trigger pages-build-deployment
      # on the openwrt-docs4ai org repos (production). Those downstream workflows
      # are GitHub-managed; their action versions cannot be controlled from here.
      - name: Publish GitHub Pages branch mirror
        env:
          GH_PAGES_BRANCH: gh-pages
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          release_tree="$STAGED_DIR/release-tree"
          pages_include_dir="$GITHUB_WORKSPACE/static/release-inputs/pages-include"
          branch_dir="$RUNNER_TEMP/gh-pages-worktree"

          if [ ! -d "$release_tree" ]; then
            echo "FAIL: release-tree not found: $release_tree"
            exit 1
          fi

          rm -rf "$branch_dir"

          if git ls-remote --exit-code --heads origin "$GH_PAGES_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$GH_PAGES_BRANCH"
            git worktree add --force -B "$GH_PAGES_BRANCH" "$branch_dir" "origin/$GH_PAGES_BRANCH"
          else
            git worktree add --detach "$branch_dir"
            (
              cd "$branch_dir"
              git checkout --orphan "$GH_PAGES_BRANCH"
              find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            )
          fi

          python tools/sync_tree.py mirror-tree --src "$release_tree" --dest "$branch_dir" --exclude .git
          if [ -d "$pages_include_dir" ]; then
            python tools/sync_tree.py overlay-tree --src "$pages_include_dir" --dest "$branch_dir"
          fi
          touch "$branch_dir/.nojekyll"

          (
            cd "$branch_dir"
            git add --all
            if git diff --cached --quiet; then
              echo "No gh-pages changes to publish."
              exit 0
            fi

            git commit -m "docs: refresh pages mirror $(date -u +%Y-%m-%d)"
            git push --set-upstream origin "$GH_PAGES_BRANCH"
          )
      - name: Determine external distribution eligibility
        id: distribution_gate
        env:
          DIST_APP_ID_PRESENT: ${{ secrets.DIST_APP_ID != '' }}
          DIST_APP_PRIVATE_KEY_PRESENT: ${{ secrets.DIST_APP_PRIVATE_KEY != '' }}
        run: |
          set -euo pipefail

          enabled="true"
          reason=""

          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            enabled="false"
            reason="external distribution publishes only from refs/heads/main"
          elif [ "$DIST_APP_ID_PRESENT" != "true" ] || [ "$DIST_APP_PRIVATE_KEY_PRESENT" != "true" ]; then
            enabled="false"
            reason="distribution app secrets are not configured"
          fi

          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

          if [ "$enabled" != "true" ]; then
            echo "Skipping external distribution publish: $reason"
          fi
      - name: Prepare distribution metadata
        if: steps.distribution_gate.outputs.enabled == 'true'
        id: distribution_meta
        run: |
          set -euo pipefail

          dist_date="$(date -u +%Y-%m-%d)"
          notes_path="$RUNNER_TEMP/corpus-release-notes.md"

          cat > "$notes_path" <<EOF
          Automated distribution snapshot.

          - Source repository: ${GITHUB_REPOSITORY}
          - Source commit: ${GITHUB_SHA}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          echo "dist_date=$dist_date" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$dist_date" >> "$GITHUB_OUTPUT"
          echo "release_name=openwrt-docs4ai $dist_date" >> "$GITHUB_OUTPUT"
          echo "zip_name=openwrt-docs4ai-$dist_date.zip" >> "$GITHUB_OUTPUT"
          echo "zip_root_dir=$DIST_ZIP_ROOT_DIR" >> "$GITHUB_OUTPUT"
          echo "source_sha_short=$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "notes_path=$notes_path" >> "$GITHUB_OUTPUT"
      - name: Validate external distribution staging
        if: steps.distribution_gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          release_tree="$STAGED_DIR/release-tree"

          if [ ! -d "$release_tree" ]; then
            echo "FAIL: release-tree missing: $release_tree"
            exit 1
          fi

          if [ ! -f "$release_tree/llms.txt" ]; then
            echo "FAIL: release-tree missing llms.txt"
            exit 1
          fi

          if [ ! -f "$release_tree/index.html" ]; then
            echo "FAIL: release-tree missing index.html"
            exit 1
          fi

          llms_size="$(wc -c < "$release_tree/llms.txt" | tr -d '[:space:]')"
          if [ "$llms_size" -le 512 ]; then
            echo "FAIL: release-tree llms.txt is unexpectedly small ($llms_size bytes)"
            exit 1
          fi

          module_count="$(find "$release_tree" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d '[:space:]')"
          if [ "$module_count" -lt 4 ]; then
            echo "FAIL: release-tree has too few module directories ($module_count)"
            exit 1
          fi

          if find "$release_tree" \( -name 'L1-raw' -o -name 'L2-semantic' -o -name 'openwrt-condensed-docs' \) -print | grep -q .; then
            echo "FAIL: release-tree contains legacy paths"
            exit 1
          fi
      - name: Resolve staged distribution ZIP
        if: steps.distribution_gate.outputs.enabled == 'true'
        id: distribution_zip
        run: |
          set -euo pipefail

          packages_dir="$STAGED_DIR/packages"
          expected_name="${{ steps.distribution_meta.outputs.zip_name }}"

          mapfile -t zip_files < <(find "$packages_dir" -maxdepth 1 -type f -name '*.zip' | sort)
          if [ "${#zip_files[@]}" -ne 1 ]; then
            echo "FAIL: expected exactly one staged distribution zip in $packages_dir"
            exit 1
          fi

          zip_path="${zip_files[0]}"
          zip_name="$(basename "$zip_path")"
          if [ "$zip_name" != "$expected_name" ]; then
            echo "FAIL: expected staged zip $expected_name, found $zip_name"
            exit 1
          fi
          if [ ! -s "$zip_path" ]; then
            echo "FAIL: staged zip is empty: $zip_path"
            exit 1
          fi

          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
      - name: Create corpus distribution token
        if: steps.distribution_gate.outputs.enabled == 'true'
        id: corpus_app_token
        uses: actions/create-github-app-token@main
        with:
          app-id: ${{ secrets.DIST_APP_ID }}
          private-key: ${{ secrets.DIST_APP_PRIVATE_KEY }}
          owner: openwrt-docs4ai
          repositories: corpus
      - name: Checkout corpus distribution repository
        if: steps.distribution_gate.outputs.enabled == 'true'
        uses: actions/checkout@main
        with:
          repository: ${{ env.DIST_RELEASE_REPO }}
          token: ${{ steps.corpus_app_token.outputs.token }}
          ref: ${{ env.DIST_TARGET_BRANCH }}
          path: external-targets/corpus
          fetch-depth: 0
      - name: Publish corpus distribution repository
        if: steps.distribution_gate.outputs.enabled == 'true'
        id: publish_corpus
        run: |
          set -euo pipefail

          release_tree="$STAGED_DIR/release-tree"
          repo_dir="$GITHUB_WORKSPACE/external-targets/corpus"

          git -C "$repo_dir" config user.name "github-actions[bot]"
          git -C "$repo_dir" config user.email "github-actions[bot]@users.noreply.github.com"

          python tools/sync_tree.py mirror-tree --src "$release_tree" --dest "$repo_dir" --exclude .git

          git -C "$repo_dir" add --all
          if git -C "$repo_dir" diff --cached --quiet; then
            echo "No corpus changes to publish."
          else
            git -C "$repo_dir" commit -m "docs: publish corpus ${{ steps.distribution_meta.outputs.dist_date }} (source ${{ steps.distribution_meta.outputs.source_sha_short }})"
            git -C "$repo_dir" pull --rebase origin "$DIST_TARGET_BRANCH"
            git -C "$repo_dir" push origin "HEAD:$DIST_TARGET_BRANCH"
          fi

          echo "head_sha=$(git -C "$repo_dir" rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish corpus release asset
        if: steps.distribution_gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ steps.corpus_app_token.outputs.token }}
        run: |
          set -euo pipefail

          release_tag="${{ steps.distribution_meta.outputs.release_tag }}"
          release_name="${{ steps.distribution_meta.outputs.release_name }}"
          notes_path="${{ steps.distribution_meta.outputs.notes_path }}"
          zip_path="${{ steps.distribution_zip.outputs.zip_path }}"
          target_sha="${{ steps.publish_corpus.outputs.head_sha }}"
          notes_body="$(cat "$notes_path")"

          if gh release view "$release_tag" --repo "$DIST_RELEASE_REPO" >/dev/null 2>&1; then
            gh release edit "$release_tag" --repo "$DIST_RELEASE_REPO" --title "$release_name" --notes "$notes_body"
          else
            gh release create "$release_tag" --repo "$DIST_RELEASE_REPO" --target "$target_sha" --title "$release_name" --notes "$notes_body"
          fi

          gh release upload "$release_tag" "$zip_path" --repo "$DIST_RELEASE_REPO" --clobber
      - name: Create external Pages distribution token
        if: steps.distribution_gate.outputs.enabled == 'true'
        id: pages_app_token
        uses: actions/create-github-app-token@main
        with:
          app-id: ${{ secrets.DIST_APP_ID }}
          private-key: ${{ secrets.DIST_APP_PRIVATE_KEY }}
          owner: openwrt-docs4ai
          repositories: openwrt-docs4ai.github.io
      - name: Checkout external Pages distribution repository
        if: steps.distribution_gate.outputs.enabled == 'true'
        uses: actions/checkout@main
        with:
          repository: ${{ env.DIST_PAGES_REPO }}
          token: ${{ steps.pages_app_token.outputs.token }}
          ref: ${{ env.DIST_TARGET_BRANCH }}
          path: external-targets/pages
          fetch-depth: 0
      - name: Publish external Pages distribution repository
        if: steps.distribution_gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          release_tree="$STAGED_DIR/release-tree"
          repo_dir="$GITHUB_WORKSPACE/external-targets/pages"
          pages_include_dir="$GITHUB_WORKSPACE/static/release-inputs/pages-include"

          git -C "$repo_dir" config user.name "github-actions[bot]"
          git -C "$repo_dir" config user.email "github-actions[bot]@users.noreply.github.com"

          python tools/sync_tree.py mirror-tree --src "$release_tree" --dest "$repo_dir" --exclude .git
          if [ -d "$pages_include_dir" ]; then
            python tools/sync_tree.py overlay-tree --src "$pages_include_dir" --dest "$repo_dir"
          fi

          git -C "$repo_dir" add --all
          if git -C "$repo_dir" diff --cached --quiet; then
            echo "No external Pages changes to publish."
          else
            git -C "$repo_dir" commit -m "docs: publish pages ${{ steps.distribution_meta.outputs.dist_date }} (source ${{ steps.distribution_meta.outputs.source_sha_short }})"
            git -C "$repo_dir" pull --rebase origin "$DIST_TARGET_BRANCH"
            git -C "$repo_dir" push origin "HEAD:$DIST_TARGET_BRANCH"
          fi

  # ── Final Summary: Always emit run-state artifact ───────
  pipeline_summary:
    needs: [validate_source, initialize, extract_wiki, extract_cookbook, extract, extract_summary, process, deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@main
        with:
          python-version: "3.12"
      - name: Prepare summary directories
        run: |
          mkdir -p "$WORKDIR/run-summary"
          mkdir -p "$WORKDIR/extract-summary"
      - name: Download extract summary artifact
        continue-on-error: true
        uses: actions/download-artifact@main
        with:
          name: extract-summary
          path: ${{ env.WORKDIR }}/extract-summary/
      - name: Download process summary artifact
        continue-on-error: true
        uses: actions/download-artifact@main
        with:
          name: process-summary
          path: ${{ env.WORKDIR }}/run-summary/
      - name: Build pipeline summary
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          workdir = Path(os.environ["WORKDIR"])
          run_summary_dir = workdir / "run-summary"
          run_summary_dir.mkdir(parents=True, exist_ok=True)

          needs = json.loads(os.environ.get("NEEDS_JSON", "{}"))
          extract_summary_path = workdir / "extract-summary" / "extract-summary.json"
          process_summary_path = run_summary_dir / "process-summary.json"

          extract_summary = None
          if extract_summary_path.is_file():
              extract_summary = json.loads(extract_summary_path.read_text(encoding="utf-8"))

          process_summary = None
          if process_summary_path.is_file():
              process_summary = json.loads(process_summary_path.read_text(encoding="utf-8"))

          payload = {
              "repository": os.environ.get("GITHUB_REPOSITORY"),
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
              "ref": os.environ.get("GITHUB_REF"),
              "jobs": {name: details.get("result", "unknown") for name, details in needs.items()},
              "extract_summary": extract_summary,
              "process_summary": process_summary,
          }

          (run_summary_dir / "pipeline-summary.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")

          lines = [
              "# Pipeline Summary",
              "",
              f"- repository: {payload['repository']}",
              f"- run_id: {payload['run_id']} (attempt {payload['run_attempt']})",
              f"- ref: {payload['ref']}",
              "",
              "## Job Results",
              "",
          ]

          for job_name in sorted(payload["jobs"]):
              lines.append(f"- {job_name}: {payload['jobs'][job_name]}")

          lines.append("")
          lines.append("## Extract Contracts")
          lines.append("")
          if extract_summary:
              lines.append(f"- extractor_count: {extract_summary.get('extractor_count', 0)}")
              lines.append(f"- contract_failures: {extract_summary.get('contract_failures', 0)}")
          else:
              lines.append("- extract summary artifact unavailable")

          lines.append("")
          lines.append("## Staging Contract")
          lines.append("")
          if process_summary:
              lines.append(f"- contract_ok: {str(process_summary.get('contract_ok', False)).lower()}")
              lines.append(
                f"- validate_output_outcome: {process_summary.get('validate_output_outcome', 'unknown')}"
              )
              missing = process_summary.get("missing_required_files", [])
              lines.append(f"- missing_required_files: {', '.join(missing) if missing else 'none'}")
          else:
              lines.append("- process summary artifact unavailable")

          lines.append("")
          lines.append("## AI Stage")
          lines.append("")
          if process_summary and isinstance(process_summary.get("ai"), dict):
              ai_block = process_summary.get("ai", {})
              ai_timers = ai_block.get("timers", {}) if isinstance(ai_block.get("timers"), dict) else {}
              ai_counters = ai_block.get("counters", {}) if isinstance(ai_block.get("counters"), dict) else {}
              lines.append(f"- ai_status: {ai_block.get('status', 'unknown')}")
              lines.append(f"- ai_total_seconds: {ai_timers.get('total_seconds', 'n/a')}")
              lines.append(f"- ai_api_calls: {ai_timers.get('api_calls', 'n/a')}")
              lines.append(f"- ai_enriched: {ai_counters.get('applied', 'n/a')}")
          else:
              lines.append("- ai stage summary unavailable")

          if process_summary and process_summary.get("stage_timings"):
              timings = process_summary["stage_timings"]
              total = sum(timings.values())
              lines += [
                  "",
                  "## Process Stage Timings",
                  "",
                  "| Stage | Seconds |",
                  "|-------|---------|",
              ]
              for label, secs in timings.items():
                  lines.append(f"| {label} | {secs} |")
              lines.append(f"| **total** | **{total}** |")

          (run_summary_dir / "pipeline-summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
      - name: Upload pipeline summary artifact
        uses: actions/upload-artifact@main
        with:
          name: pipeline-summary
          path: |
            ${{ env.WORKDIR }}/run-summary/pipeline-summary.json
            ${{ env.WORKDIR }}/run-summary/pipeline-summary.md
          retention-days: 7
      - name: Append pipeline summary to step summary
        run: cat "$WORKDIR/run-summary/pipeline-summary.md" >> "$GITHUB_STEP_SUMMARY"
